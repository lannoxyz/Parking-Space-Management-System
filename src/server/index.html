<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Smart Parking System</h1>

    <div class="card">
        <h2>Parking Slots</h2>
        <div id="parking" class="parking-grid"></div>
    </div>

    <div class="card">
        <h2>Camera Feeds</h2>
        <div class="camera-container">
            <img src="/video" class="camera">
            <img src="/video" class="camera">
        </div>
    </div>

    <div class="card">
        <h2>SSD1306 Display</h2>
        <img id="ssd" class="display">
    </div>

    <div class="card">
        <h2>Servo Status</h2>
        <div id="servo-status" class="servo-container"></div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
