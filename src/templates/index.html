<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNMC Parking Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-mark">P</div>
                <div>
                    <h1 class="site-title">UNMC Parking Management System</h1>
                    <p class="site-sub">Edge-AI Vehicle Detection &amp; Gate Control</p>
                </div>
            </div>
            <div class="header-right">
                <div class="clock-block">
                    <div class="clock" id="clock">--:--:--</div>
                    <div class="date"  id="date">-- --- ----</div>
                </div>
                <div class="status-pills">
                    <span class="pill" id="pill-cam">● CAM</span>
                    <span class="pill" id="pill-sub">● CTRL</span>
                </div>
            </div>
        </header>

        <main class="main">

            <!-- Video Row -->
            <section class="section">
                <h2 class="section-title">Live Surveillance</h2>
                <div class="video-grid">
                    <div class="video-card">
                        <div class="video-label">
                            <span class="dot dot-live"></span>
                            Raw Feed
                        </div>
                        <div class="video-wrap">
                            <img src="/video/raw" alt="Raw" class="video-img" id="vid-raw">
                        </div>
                    </div>
                    <div class="video-card">
                        <div class="video-label">
                            <span class="dot dot-ai"></span>
                            AI Processed
                        </div>
                        <div class="video-wrap">
                            <img src="/video/processed" alt="Processed" class="video-img" id="vid-proc">
                        </div>
                    </div>
                </div>
            </section>

            <!-- Bottom Row -->
            <div class="bottom-row">

                <!-- Parking -->
                <section class="section flex-grow">
                    <h2 class="section-title">Parking Slots</h2>
                    <div class="slot-grid">
                        <div class="slot-card" id="slot-0">
                            <div class="slot-num">A1</div>
                            <div class="slot-status">Vacant</div>
                            <div class="slot-freq" id="freq-0">0 Hz</div>
                        </div>
                        <div class="slot-card" id="slot-1">
                            <div class="slot-num">A2</div>
                            <div class="slot-status">Vacant</div>
                            <div class="slot-freq" id="freq-1">0 Hz</div>
                        </div>
                        <div class="slot-card" id="slot-2">
                            <div class="slot-num">A3</div>
                            <div class="slot-status">Vacant</div>
                            <div class="slot-freq" id="freq-2">0 Hz</div>
                        </div>
                        <div class="slot-card" id="slot-3">
                            <div class="slot-num">A4</div>
                            <div class="slot-status">Vacant</div>
                            <div class="slot-freq" id="freq-3">0 Hz</div>
                        </div>
                    </div>
                </section>

                <!-- Gates -->
                <section class="section gate-section">
                    <h2 class="section-title">Gate Control</h2>
                    <div class="gate-list">
                        <div class="gate-card">
                            <div class="gate-info">
                                <div class="gate-icon">↑</div>
                                <div>
                                    <div class="gate-name">Entrance Gate</div>
                                    <div class="gate-badge" id="gate-in">Closed</div>
                                </div>
                            </div>
                            <button class="gate-btn" onclick="triggerGate('in')">Open</button>
                        </div>
                        <div class="gate-card">
                            <div class="gate-info">
                                <div class="gate-icon">↓</div>
                                <div>
                                    <div class="gate-name">Exit Gate</div>
                                    <div class="gate-badge" id="gate-out">Closed</div>
                                </div>
                            </div>
                            <button class="gate-btn" onclick="triggerGate('out')">Open</button>
                        </div>
                    </div>
                    <div class="last-seen">Last frame: <span id="last-seen">—</span></div>
                </section>

            </div>
        </main>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
